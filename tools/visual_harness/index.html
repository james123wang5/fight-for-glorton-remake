<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Glorton Original Visual Baseline</title>
  <style>
    html, body { margin: 0; width: 600px; height: 400px; overflow: hidden; background: #000; }
    #player { display: block; width: 600px; height: 400px; }
  </style>
  <script>
    window.RufflePlayer = window.RufflePlayer || {};
    window.RufflePlayer.config = {
      autoplay: "on",
      unmuteOverlay: "hidden",
      letterbox: "on",
      scale: "showAll",
      quality: "high",
      contextMenu: "off",
      backgroundColor: "#000000",
      networkingAccessMode: "internal"
    };
  </script>
  <script src="ruffle/ruffle.js"></script>
</head>
<body>
  <div id="container"></div>
  <script>
    const source = window.RufflePlayer.newest();
    const player = source.createPlayer();
    const params = new URLSearchParams(location.search);
    const swfUrl = params.get("fixture") === "ko"
      ? "fight-for-glorton-ko.swf"
      : "fight-for-glorton.swf";
    player.id = "player";
    player.style.width = "600px";
    player.style.height = "400px";
    document.getElementById("container").appendChild(player);
    window.glortonHarness = {
      player,
      emulator: "Ruffle",
      seed: Number(params.get("seed") || 0),
      swfUrl,
      ready: false,
      suspend: () => player.ruffle().suspend(),
      resume: () => player.ruffle().resume()
    };
    player.ruffle().load({ url: swfUrl, autoplay: "on" }).then(() => {
      window.glortonHarness.ready = true;
      document.documentElement.dataset.ready = "true";
    });
  </script>
</body>
</html>
